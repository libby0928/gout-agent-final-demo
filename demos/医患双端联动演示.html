<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>痛风智能体 · 医患双端联动演示</title>
<style>
:root{--ink:#1d2530;--muted:#728095;--line:#e4ebf2;--bg:#edf3f8;--navy:#172033;--mint:#03d49f;--blue:#01a1ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
*{box-sizing:border-box}body{margin:0;min-width:1100px;background:radial-gradient(circle at 50% 0,#fff 0,#eaf1f7 40%,#d6e1eb 100%);color:var(--ink)}
.stage{max-width:1500px;margin:0 auto;padding:34px 28px 48px}.heading{display:flex;align-items:end;justify-content:space-between;margin-bottom:22px}.heading h1{margin:0;font-size:24px;letter-spacing:-.5px}.heading p{margin:6px 0 0;color:var(--muted);font-size:14px;font-weight:600}.live{display:flex;align-items:center;gap:7px;border-radius:999px;background:#e8f8f2;color:#198b66;padding:8px 12px;font-size:12px;font-weight:800}.live i{width:7px;height:7px;border-radius:50%;background:#2ba471}
.devices{display:grid;grid-template-columns:minmax(420px,1fr) 46px minmax(420px,1fr);align-items:start;gap:16px}.device{overflow:hidden;border:1px solid rgba(255,255,255,.82);border-radius:28px;background:rgba(255,255,255,.72);box-shadow:0 20px 50px rgba(25,45,70,.16)}.device-head{height:58px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9)}.device-title{font-size:15px;font-weight:850}.device-title span{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:700}.role{border-radius:999px;padding:5px 9px;font-size:11px;font-weight:850}.role.doctor{background:#eaf2ff;color:#1677d2}.role.patient{background:#e8f8f2;color:#168869}.frame{display:block;width:100%;height:844px;border:0;background:#1a1a2e}.arrow{padding-top:425px;display:flex;align-items:center;justify-content:center;color:#fff}.arrow span{width:42px;height:42px;border-radius:21px;background:linear-gradient(135deg,var(--mint),var(--blue));display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(1,161,255,.3);font-size:22px;font-weight:900}
.foot{margin-top:18px;text-align:center;color:#768598;font-size:12px;font-weight:700}@media(max-width:1050px){body{min-width:0}.stage{padding:18px 12px}.devices{grid-template-columns:1fr;justify-items:center}.arrow{padding:0;transform:rotate(90deg)}.device{width:min(100%,520px)}.heading{align-items:start;gap:14px;flex-direction:column}.frame{height:844px}}
</style>
</head>
<body>
<main class="stage">
  <div class="heading">
    <div><h1>痛风智能体 · 医患双端联动</h1></div>
    <div class="live"><i></i>联动已连接</div>
  </div>
  <section class="devices">
    <article class="device"><div class="device-head"><div class="device-title">医生端<span>王文龙医生 · 痛风专病</span></div><span class="role doctor">医生端</span></div><iframe id="doctor-frame" class="frame" title="医生端 Demo" src="医生端Demo.html"></iframe></article>
    <div class="arrow" aria-hidden="true"><span>↔</span></div>
    <article class="device"><div class="device-head"><div class="device-title">患者端<span>张明 · 微信小程序</span></div><span class="role patient">患者端</span></div><iframe id="patient-frame" class="frame" title="患者端定稿 Demo" src="../../痛风智能体定稿项目/01_痛风智能体/01_患者端/V1.0_2026-07定稿版/01_Demo_V1.0_2026-07定稿版/痛风专病智能体患者端Demo_V1.0_2026-07定稿版.html"></iframe></article>
  </section>
</main>
<script>
window.addEventListener('message',event=>{
  const doctor=document.getElementById('doctor-frame').contentWindow;
  const patient=document.getElementById('patient-frame').contentWindow;
  if(event.source===doctor) patient.postMessage(event.data,'*');
  if(event.source===patient) doctor.postMessage(event.data,'*');
});
</script>
</body>
</html>
