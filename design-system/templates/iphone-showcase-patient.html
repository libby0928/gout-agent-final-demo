<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>痛风智能体 · iPhone 真机演示模板</title>
  <link rel="stylesheet" href="../components.css" />
</head>
<body style="margin:0">
  <main class="ds-showcase-stage" aria-label="iPhone 真机演示模板">
    <div class="ds-showcase-shadow"></div>
    <section class="ds-showcase-device" aria-label="iPhone 预览">
      <div class="ds-simulator-bar">
        <div class="ds-simulator-lights"><span></span><span></span><span></span></div>
        <div class="ds-simulator-name">iPhone 17 Pro<small>iOS 26.5</small></div>
        <div class="ds-simulator-actions" aria-hidden="true"><span>⌂</span><span>▣</span><span>⤴</span></div>
      </div>
      <div class="ds-showcase-screen">
        <div class="ds-mobile-app">
          <div class="ds-mobile-status"><span>18:40</span><span>⌁ ●</span></div>
          <div class="ds-mobile-head">
            <div class="ds-mobile-brand">健康助手</div>
            <div class="ds-mobile-pill">已纳管</div>
          </div>
          <section class="ds-mobile-hero-card">
            <div class="ds-mobile-kicker">晚上好，张明</div>
            <div class="ds-mobile-title">今天把复诊资料补齐</div>
            <div class="ds-mobile-mascot"></div>
          </section>
          <section class="ds-mobile-card">
            <div class="ds-mobile-card-head">
              <div class="ds-mobile-card-title">诊前任务</div>
              <div class="ds-mobile-card-meta">2/3 已完成</div>
            </div>
            <div class="ds-mobile-task-list">
              <div class="ds-mobile-task">
                <div class="ds-mobile-task-icon">病</div>
                <div>
                  <div class="ds-mobile-task-title">补充痛风病史</div>
                  <div class="ds-mobile-task-desc">发作部位、频率、用药与既往检查</div>
                </div>
                <div class="ds-mobile-arrow">›</div>
              </div>
              <div class="ds-mobile-task">
                <div class="ds-mobile-task-icon">验</div>
                <div>
                  <div class="ds-mobile-task-title">上传化验报告</div>
                  <div class="ds-mobile-task-desc">按报告时间整理血尿酸和肝肾功能</div>
                </div>
                <div class="ds-mobile-arrow">›</div>
              </div>
              <div class="ds-mobile-task">
                <div class="ds-mobile-task-icon">扫</div>
                <div>
                  <div class="ds-mobile-task-title">扫码就诊</div>
                  <div class="ds-mobile-task-desc">到诊室后扫描医生接诊码</div>
                </div>
                <div class="ds-mobile-arrow">›</div>
              </div>
            </div>
          </section>
          <section class="ds-mobile-summary">
            <div class="ds-mobile-summary-label">专病档案</div>
            <div class="ds-mobile-summary-title">医生可查看已结构化资料</div>
            <div class="ds-mobile-stat-grid">
              <div class="ds-mobile-stat"><b>9</b><span>病史字段</span></div>
              <div class="ds-mobile-stat"><b>3</b><span>报告归档</span></div>
            </div>
          </section>
          <nav class="ds-mobile-tabs">
            <span>首页</span><span>档案</span><span>科普</span><span>医生</span>
          </nav>
        </div>
        <div class="ds-showcase-reflection"></div>
      </div>
    </section>
  </main>
</body>
</html>
